<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Money Manager Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>💰 Smart Money Manager Pro</h1>
        <p>Track expenses and manage your pocket money smarter.</p>
    </header>

    <section class="budget-section">
        <input type="number" id="budgetInput" placeholder="Enter Monthly Budget">
        <button id="setBudgetBtn">Set Budget</button>
        <button id="resetBtn">Reset Data</button>
    </section>

    <section class="dashboard">

        <div class="card">
            <h3>Total Budget</h3>
            <p id="totalBudget">₹0</p>
        </div>

        <div class="card">
            <h3>Total Spent</h3>
            <p id="totalSpent">₹0</p>
        </div>

        <div class="card">
            <h3>Remaining</h3>
            <p id="remainingBudget">₹0</p>
        </div>

    </section>

    <section class="progress-section">
        <h3>Budget Usage</h3>
        <div class="progress-bar">
            <div id="progressFill"></div>
        </div>
        <p id="progressText">0%</p>
    </section>

    <section class="expense-form">

        <h2>Add Expense</h2>

        <input type="number" id="amount" placeholder="Amount">

        <select id="category">
            <option value="Food">Food</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Books/Stationery">Books/Stationery</option>
            <option value="Gym">Gym</option>
            <option value="Travel">Travel</option>
            
        </select>

        <input type="date" id="date">

        <button id="addExpenseBtn">Add Expense</button>

    </section>

    <section class="analytics">

        <div class="card">
            <h3>Daily Safe Limit</h3>
            <p id="dailyLimit">₹0</p>
        </div>

        <div class="card">
            <h3>Expected Savings</h3>
            <p id="savingsForecast">₹0</p>
        </div>

    </section>

    <section id="warningBox" class="warning hidden">
    </section>

    <section class="history">

        <h2>Expense History</h2>

        <table>

            <thead>
                <tr>
                    <th>Date</th>
                    <th>Category</th>
                    <th>Amount</th>
                </tr>
            </thead>

            <tbody id="expenseTable">
            </tbody>

        </table>

    </section>

</div>

<script src="script.js"></script>
</body>
</html>
